<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="mirrorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f857a6"/>
      <stop offset="100%" style="stop-color:#ff5858"/>
    </linearGradient>
  </defs>

  <!-- Eye / target circle -->
  <circle cx="200" cy="180" r="50" fill="none" stroke="url(#mirrorGrad)" stroke-width="3"/>
  <circle cx="200" cy="180" r="20" fill="url(#mirrorGrad)" opacity="0.9"/>

  <!-- Crosshair lines -->
  <line x1="140" y1="180" x2="260" y2="180" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="120" x2="200" y2="240" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>

  <!-- MIRROR text -->
  <text x="200" y="280" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="800" fill="url(#mirrorGrad)" letter-spacing="6">
    MIRROR
  </text>
</svg>
