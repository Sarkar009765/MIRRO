<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="mirrorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f857a6"/>
      <stop offset="100%" style="stop-color:#ff5858"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="200" cy="180" r="110" fill="none" stroke="url(#mirrorGrad)" stroke-width="2.5" opacity="0.3"/>

  <!-- Inner ring -->
  <circle cx="200" cy="180" r="75" fill="none" stroke="url(#mirrorGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- Eye / target circle -->
  <circle cx="200" cy="180" r="50" fill="none" stroke="url(#mirrorGrad)" stroke-width="3"/>
  <circle cx="200" cy="180" r="20" fill="url(#mirrorGrad)" opacity="0.9"/>

  <!-- Crosshair lines -->
  <line x1="130" y1="180" x2="270" y2="180" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="110" x2="200" y2="250" stroke="url(#accent)" stroke-width="1.5" opacity="0.6"/>

  <!-- Scanning arc -->
  <path d="M 160 80 A 120 120 0 0 1 270 130" fill="none" stroke="url(#accent)" stroke-width="2" stroke-dasharray="4 6" opacity="0.7"/>

  <!-- Data nodes -->
  <circle cx="120" cy="120" r="4" fill="#00d2ff" filter="url(#glow)"/>
  <circle cx="280" cy="240" r="3" fill="#f857a6" filter="url(#glow)"/>
  <circle cx="290" cy="130" r="3" fill="#00d2ff" filter="url(#glow)"/>
  <circle cx="130" cy="250" r="3.5" fill="#f857a6" filter="url(#glow)"/>

  <!-- Connection lines from nodes to center -->
  <line x1="120" y1="120" x2="200" y2="180" stroke="#00d2ff" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>
  <line x1="280" y1="240" x2="200" y2="180" stroke="#f857a6" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>
  <line x1="290" y1="130" x2="200" y2="180" stroke="#00d2ff" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>
  <line x1="130" y1="250" x2="200" y2="180" stroke="#f857a6" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>

  <!-- Pulse ring -->
  <circle cx="200" cy="180" r="60" fill="none" stroke="#00d2ff" stroke-width="1" opacity="0.2">
    <animate attributeName="r" values="50;80;50" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom accent bar -->
  <rect x="100" y="280" width="200" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- MIRROR text -->
  <text x="200" y="310" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="800" fill="url(#mirrorGrad)" letter-spacing="6">
    MIRROR
  </text>

  <!-- Tagline -->
  <text x="200" y="340" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#8888aa" letter-spacing="3" opacity="0.8">
    AUTONOMOUS CLIENT HUNTING ORGANISM
  </text>
</svg>
